# Remakepire Text Content Configuration File

# Note from the developer:
# This file contains config options for much of the text within the Vampires game, such as the contents of the cure books, or the border messages.
# Interaction with this file is UNNECESSARY to running a Vampires game. If this file is overwhelming you, just leave all the "custom..." variables
# as false, and close the file.
#
# The default text of the plugin has been written in each config option. Use these to guide your customization process.
# The character '§' indicates a text modifier, based on what character comes next (§o §5 are two examples). Use them to modify the appearance of
# their lines of text as desired.


# ============================================================================
# CURE BOOKS - CONTENT AND MESSAGES
#   Inside this section, there are controls for each part of the cure book encounters.
#   Begin by setting custom-cure-books to true, and then edit or replace sections to change the titles, authors, and pages of the four cure books.
#   To begin changing the messages that are sent when different conditions are met (first time opening the cure books, cure trinity completed, etc.),
#     set custom-cure-book-messages to true.
#   To return the books and messages to their original forms, toggle their custom control back to false and the plugin will revert to the default version of each feature.
# ============================================================================

# Enable/Disable using the content in this file inside the cure books
# The config modifier is responsible for testing their custom book contents to ensure alignment and quality is as desired
# Default: false (Custom content disabled)
custom-cure-books: false

# The custom content for cure book 1 - The Remedy
cure-book-1:
  # The title of the first cure book
  # Default: The Remedy
  title: "The Remedy"

  # The author of the first cure book
  # Default: §5An ancient scholar
  author: "§5An ancient scholar"

  # The page contents of the first cure book
  # Each bullet point is a new page, ordered from first to last in the book
  pages:
    - "§5§lTHE REMEDY§r\n§8Part I of III\n\n§7In the darkest hours, when the cursed blood burns within your veins, know that salvation exists.\n\n§7The ancients spoke of a trinity of knowledge..."
    - "§7...that when combined, can sever the unholy bond between mortal and monster.\n\n§7This is the first piece of that forbidden wisdom.\n\n§8Read on, seeker of the light..."

  # The name attached to the first cure book item
  # Default: The Remedy 1/3
  item-title: "The Remedy 1/3"

  # The lore content of the first cure book (The text beneath the author name)
  # Each bullet point is a new separate line, ordered from top to bottom in the item description
  item-details:
    - "§5An ancient tome of forbidden knowledge"
    - "§7Part 1 of the cure series"
    - ""
    - "§eRead this book to absorb its wisdom"


# The custom content for cure book 2 - The Cure
cure-book-2:
  # The title of the second cure book
  # Default: The Cure
  title: "The Cure"

  # The author of the second cure book
  # Default: §5An ancient scholar
  author: "§5An ancient scholar"

  # The page contents of the second cure book
  # Each bullet point is a new page, ordered from first to last in the book
  pages:
    - "§5§lTHE CURE§r\n§8Part II of III\n\n§7The second fragment reveals the nature of the curse itself.\n\n§7Born of darkness, sustained by blood, the vampire's existence is a perversion of nature's order..."
    - "§7...yet within this perversion lies the key to its undoing.\n\n§7Holy water, blessed by the righteous, weakens the bond.\n\n§8Continue your search, truth-seeker..."

  # The name attached to the second cure book item
  # Default: The Cure 2/3
  item-title: "The Cure 2/3"

  # The lore content of the second cure book
  # Each bullet point is a new separate line, ordered from top to bottom in the item description
  item-details:
    - "§5An ancient tome of forbidden knowledge"
    - "§7Part 2 of the cure series"
    - ""
    - "§eRead this book to absorb its wisdom"


# The custom content for cure book 3 - The Absolution
cure-book-3:
  # The title of the third cure book
  # Default: The Absolution
  title: "The Absolution"

  # The author of the third cure book
  # Default: §5An ancient scholar
  author: "§5An ancient scholar"

  # The page contents of the third cure book
  # Each bullet point is a new page, ordered from first to last in the book
  pages:
    - "§5§lTHE ABSOLUTION§r\n§8Part III of III\n\n§7The final piece completes the trinity.\n\n§7With all three fragments of knowledge, the words of power are revealed:\n\n§6voluntate-mea-hoc-nefandum-vinculum-abicio"
    - "§7Stand near a holy beacon, with holy water upon your person, beneath the light of day.\n\n§7Speak the words, and be free of the curse forevermore.\n\n§8May the light guide your path."

  # The name attached to the third cure book item
  # Default: The Absolution 3/3
  item-title: "The Absolution 3/3"

  # The lore content of the third cure book (The text beneath the author name)
  # Each bullet point is a new separate line, ordered from top to bottom in the item description
  item-details:
    - "§5An ancient tome of forbidden knowledge"
    - "§7Part 3 of the cure series"
    - ""
    - "§eRead this book to absorb its wisdom"


# The custom content for cure book 4 - The Retribution
cure-book-4:
  # The title of the fourth cure book
  # Default: The Retribution
  title: "The Retribution"

  # The author of the fourth cure book
  # Default: §4A vengeful spirit
  author: "§4A vengeful spirit"

  # The page contents of the fourth cure book
  # Each bullet point is a new page, ordered from first to last in the book
  pages:
    - "§4§lTHE RETRIBUTION§r\n§8The Fourth Tome\n\n§7This knowledge was never meant to be found.\n\n§7While the trinity speaks of self-salvation, this tome reveals darker words - words of forced redemption...",
    - "§7...or forced damnation.\n\n§4hoc-vinculum-tibi-dirumpo-mala-creatura\n\n§7With these words, you may force the choice upon another creature of the night.\n\n§8Use this power wisely, for it carries great consequence."

  # The page contents of the fourth cure book that appear if the reader has not completed the Trinity of Restoration
  # Each bullet point is a new page, ordered from first to last in the book
  unreadable-pages:
    - "§8§oThe words within this tome are beyond your comprehension...\n\n§7Perhaps you must first complete the Trinity of Restoration."

  # The name attached to the fourth cure book item
  # Default: The Retribution 4/3
  item-title: "The Retribution 4/3"

  # The lore content of the fourth cure book
  # Each bullet point is a new separate line, ordered from top to bottom in the item description
  item-details:
    - "§5An ancient tome of forbidden knowledge"
    - "§7Part 4 of the cure series"
    - ""
    - "§eRead this book to absorb its wisdom"



# Enable/Disable using the content in this file for messages that appear when a player reads a cure book
# The config modifier is responsible for testing their custom book contents to ensure alignment and quality is as desired
# Default: false (Custom content disabled)
custom-cure-book-messages: false

cure-book-messages:

  cure-book-1-read:
    - ""

  cure-book-2-read:
    - ""

  cure-book-3-read:
    - ""

  cure-book-4-read:
    - ""

  cure-book-4-unreadable:
    - ""

